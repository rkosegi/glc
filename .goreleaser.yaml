---
version: 2
project_name: glc
force_token: github
release:
  github:
    owner: rkosegi
    name: glc
  name_template: '{{.Tag}}'
builds:
  - id: glc
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64_v1
      - linux_arm64
      - darwin_amd64_v1
      - darwin_arm64
      - windows_amd64_v1
      - windows_arm64
    dir: .
    main: ./pkg/cli/main.go
    binary: glc
    ldflags:
      - -s -w
      - -X github.com/rkosegi/glc/pkg/internal.Version={{.Version}}
      - -X github.com/rkosegi/glc/pkg/internal.Revision={{.Commit}}
      - -X github.com/rkosegi/glc/pkg/internal.Branch={{.Tag}}
      - -X github.com/rkosegi/glc/pkg/internal.BuildDate={{.Date}}
      - -X github.com/rkosegi/glc/pkg/internal.BuildUser={{.Env.USER}}
